---
# Ubuntu - Install tmux
- name: Install tmux (Ubuntu)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.apt:
    name: tmux
    state: present
  become: true

# macOS - Install tmux
- name: Install tmux (macOS)
  when:
    - ansible_facts['os_family'] == 'Darwin'
  community.general.homebrew:
    name: tmux
    state: latest

# Ubuntu - Install ghostty terminfo (needed when SSH'ing from Ghostty)
- name: Check if ghostty terminfo is installed (Ubuntu)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.shell: infocmp xterm-ghostty
  register: ghostty_terminfo_check
  changed_when: false
  failed_when: false

- name: Copy ghostty terminfo file (Ubuntu)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_terminfo_check.rc != 0
  ansible.builtin.copy:
    src: xterm-ghostty.terminfo
    dest: /tmp/xterm-ghostty.terminfo
    mode: '0644'

- name: Install ghostty terminfo (Ubuntu)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - ghostty_terminfo_check.rc != 0
  ansible.builtin.shell: tic -x /tmp/xterm-ghostty.terminfo
  become: true

# All OS - Install TPM
- name: Install tmux plugin manager (TPM)
  ansible.builtin.git:
    repo: https://github.com/tmux-plugins/tpm.git
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux/plugins/tpm"
    update: true

# All OS - Copy config
- name: Copy tmux conf file
  ansible.builtin.copy:
    src: tmux.conf
    dest: "{{ ansible_facts['env']['HOME'] }}/.tmux.conf"
    mode: '0644'
