---
# --- Node.js (platform-specific) ---
- name: install node.js on macOS
  when: ansible_facts['os_family'] == 'Darwin'
  community.general.homebrew:
    name: node
    state: present

- name: install node.js on Ubuntu
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.apt:
    name:
      - nodejs
      - npm
    state: present
  become: true

# --- GitHub CLI (for code-review plugin) ---
- name: install github cli on macOS
  when: ansible_facts['os_family'] == 'Darwin'
  community.general.homebrew:
    name: gh
    state: present

- name: add github cli apt repository on Ubuntu
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.shell: |
    curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
  args:
    creates: /usr/share/keyrings/githubcli-archive-keyring.gpg
  become: true

- name: install github cli on Ubuntu
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.apt:
    name: gh
    state: present
    update_cache: true
  become: true

# --- Azure CLI + DevOps extension ---
- name: install azure cli on macOS
  when: ansible_facts['os_family'] == 'Darwin'
  community.general.homebrew:
    name: azure-cli
    state: present

- name: install azure cli on Ubuntu
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.shell: curl -sL https://aka.ms/InstallAzureCLIDeb | sudo bash
  args:
    creates: /usr/bin/az
  become: true

- name: install azure devops extension
  ansible.builtin.shell: az extension add --name azure-devops --yes
  register: az_ext_result
  changed_when: "'already installed' not in az_ext_result.stderr"
  failed_when: false

- name: configure azure devops defaults
  when: claude_ado_organization != ""
  ansible.builtin.shell: >
    az devops configure --defaults
    organization={{ claude_ado_organization }}
    project={{ claude_ado_project }}

# --- Claude Desktop (for Cowork - PowerPoint, Word, Excel) ---
- name: install claude desktop on macOS
  when: ansible_facts['os_family'] == 'Darwin'
  community.general.homebrew_cask:
    name: claude
    state: present

- name: check if running in WSL
  when: ansible_facts['distribution'] == 'Ubuntu'
  ansible.builtin.stat:
    path: /proc/sys/fs/binfmt_misc/WSLInterop
  register: wsl_check

- name: check if claude desktop is installed on Ubuntu (WSL)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - wsl_check.stat.exists
  ansible.builtin.shell: cmd.exe /c "winget list --id Anthropic.Claude"
  register: claude_desktop_check
  changed_when: false
  failed_when: false

- name: install claude desktop on Ubuntu (WSL)
  when:
    - ansible_facts['distribution'] == 'Ubuntu'
    - wsl_check.stat.exists
    - claude_desktop_check.rc != 0 or 'Anthropic.Claude' not in claude_desktop_check.stdout
  ansible.builtin.shell: cmd.exe /c "winget install Anthropic.Claude --accept-source-agreements --accept-package-agreements"
  register: claude_desktop_install
  changed_when: "'Successfully installed' in claude_desktop_install.stdout"

# --- Claude CLI (shared) ---
- name: check if claude is installed
  ansible.builtin.shell: claude --version
  register: claude_check
  changed_when: false
  failed_when: false

- name: install claude cli
  when: claude_check.rc != 0
  ansible.builtin.shell: npm install -g @anthropic-ai/claude-code
  become: "{{ true if ansible_facts['distribution'] == 'Ubuntu' else false }}"
  register: claude_install
  changed_when: "'added' in claude_install.stdout"

# --- Config directory ---
- name: create claude config directory
  ansible.builtin.file:
    path: "{{ claude_config_dir }}"
    state: directory
    mode: "0755"

# --- Settings ---
- name: deploy settings.json
  ansible.builtin.template:
    src: settings.json.j2
    dest: "{{ claude_config_dir }}/settings.json"
    mode: "0600"

# --- Plugins ---
- name: install claude plugins
  ansible.builtin.shell: "claude plugins install {{ item }}"
  loop: "{{ claude_plugins }}"
  register: plugin_result
  changed_when: "'installed' in plugin_result.stdout"
  failed_when: false

# --- Skills directory ---
- name: create skills directory
  ansible.builtin.file:
    path: "{{ claude_config_dir }}/skills"
    state: directory
    mode: "0755"

# --- External skills (git clone) ---
- name: clone external skills
  ansible.builtin.git:
    repo: "{{ item.repo }}"
    dest: "{{ claude_config_dir }}/skills/{{ item.name }}"
    depth: 1
    update: true
  loop: "{{ claude_external_skills }}"

# --- Bundled skills (copy from role) ---
- name: deploy bundled skills
  ansible.builtin.copy:
    src: "skills/{{ item }}/"
    dest: "{{ claude_config_dir }}/skills/{{ item }}/"
    mode: "0644"
  loop: "{{ claude_bundled_skills }}"

# --- Post-install reminder ---
- name: remind user to login
  ansible.builtin.debug:
    msg: "Claude CLI installed. Run 'claude login' to authenticate. Run 'az login' and 'az devops configure --defaults organization=<org> project=<project>' to set up Azure DevOps."
